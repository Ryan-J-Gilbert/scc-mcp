meta:
  uri: scc://reference/partitions
  name: SCC partition reference (illustrative)
  description: Example partition table shape; confirm live limits with official SCC documentation.
  mime_type: text/yaml

disclaimer: |
  Partition names, limits, and GPU availability are **examples only** and drift over semesters.
  Always check the live SCC user guide, `sinfo`, or staff announcements before submitting production workloads.

partitions:
  - name: shared
    typical_use: Throughput CPU jobs; modest walltimes; no dedicated GPUs unless documented otherwise.
    limits_example:
      max_walltime: "48:00:00"
      cores_per_job_note: "Tune -n / -c to match partition policy."
      memory_note: "Use --mem or --mem-per-cpu consistent with scheduler defaults."
    gpu: false
  - name: interactive
    typical_use: Short debugging sessions; may have tighter wall limits.
    limits_example:
      max_walltime: "04:00:00"
    gpu: false
  - name: gpu
    typical_use: Single- or multi-GPU training and inference.
    limits_example:
      max_walltime: "24:00:00"
      gres_example: "--gres=gpu:1"
    gpu: true

how_to_check_live:
  - sinfo -o "%P %a %l %D %t %N"
  - scontrol show partition <name>
  - Module and GPU driver compatibility notes in SCC GPU quickstart pages.

selection_tips:
  - Match walltime to the smallest sufficient limit to improve queue priority.
  - Request GPUs only on GPU partitions; CPU-only jobs should not hold GPU GRES lines.
  - For large parallel jobs, confirm whether the partition is routed for wide MPI jobs.
