meta:
  uri: scc://commands/modules
  name: Environment modules (SCC / Lmod)
  description: module load, avail, spider, and list patterns on SCC; bash -l requirement for batch scripts.
  mime_type: text/yaml

overview: |
  SCC uses **Lmod**-style **module** commands to load compilers, Python, MPI, CUDA stacks, etc.
  When **module** appears in a **qsub** batch script, TechWeb requires the interpreter line
  **#!/bin/bash -l** so module initialization is applied correctly.

core_commands:
  module_load:
    syntax: module load <name[/version]> [<name2> ...]
    notes:
      - The systems Python is often outdated; load a module such as **python3/3.13.8** for supported stacks.
      - Load order matters when mixing compilers, MPI, and CUDA.
  module_purge:
    syntax: module purge
    notes:
      - Clears the stack; common before explicit loads in reproducible batch scripts.
  module_list:
    syntax: module list
    meaning: Show currently loaded modules.
  module_avail:
    syntax: module avail [substring]
    meaning: Browse available modules (output can be very long—pipe to **less**).
  module_spider:
    syntax: module spider <name>
    meaning: Describe a package and versions / prerequisites.

batch_script_requirement: |
  #!/bin/bash -l

  #$ -P my_project
  #$ -l h_rt=12:00:00

  module load matlab/2021b
  matlab -nodisplay -nodesktop -singleCompThread -batch "n=4, rand; exit"

discovery_workflow:
  - step: module avail 2>&1 | less
    detail: Browse the full tree safely.
  - step: module avail cuda
    detail: Narrow to CUDA-related modules.
  - step: module spider openmpi
    detail: Inspect MPI family before loading next to applications.

gotchas:
  - Always use **bash -l** in scripts that call **module** (per SCC TechWeb).
  - Pick one compiler/MPI family per job; mixing stacks usually fails.
  - GPU ML stacks may use conda modules (e.g. **academic-ml/...**)—follow the GPU batch examples on TechWeb.
