meta:
  uri: scc://commands/storage
  name: Storage, scratch, and job I/O (SCC)
  description: >-
    Per-node scratch, TMPDIR, /net paths, memory fairness, and related commands—aligned with
    TechWeb “Resources Available for your Jobs”.
  mime_type: text/yaml

overview: |
  Memory and scratch behavior on SCC is described in terms of **slots** (cores) and **fair share**
  on shared nodes. Local **scratch** and **TMPDIR** are the right places for large temporary job I/O;
  project space may be slower for high-throughput patterns.

runtime:
  default_interactive_and_batch_hours: 12
  note: |
    Request shorter or longer walltimes with **#$ -l h_rt=hh:mm:ss** (see submitting-jobs page).
    Shorter runtimes can improve scheduling opportunities (e.g. many buy-in nodes accept ≤12h jobs).

memory_fairness:
  note: |
    Memory limits are enforced at dispatch time; the scheduler cannot cap RSS after the job starts.
    On a fully packed node, a single-slot job should stay near **TotalMemory / NumCores** for that
    node class. Request more slots (**-pe omp N**) and/or **-l mem_per_core=…** when you need more RAM.

scratch_local:
  path: "/scratch"
  meaning: Local scratch on each compute node; **not backed up**; files may be removed after **31 days**.
  remote_access_pattern: "/net/scc-xx#/scratch"
  meaning: >-
    Reach another node’s scratch from elsewhere by hostname pattern **scc-xx#** (see Technical Summary
    for full node names). Example: **cd /net/scc-fc3/scratch**.

tmpdir:
  env: TMPDIR
  meaning: >-
    Per-job temporary directory created when the job is dispatched; contents removed when the job ends.
    Use for intermediates you do not need to keep.

project_disk:
  note: |
    Project disk space is appropriate for shared datasets and results; for heavy I/O, stage inputs
    or intermediates on local scratch when practical.

gpu_inventory:
  command: "qgpus"
  note: "Short GPU summary; **qgpus -v** for capability, memory, CPU counts, and queue assignments."

network:
  note: |
    Most nodes use 1GbE to shared filesystems; a subset has 10GbE. Multi-node MPI jobs use InfiniBand
    (e.g. 40G QDR / 56G FDR per TechWeb).

quota_and_usage_commands:
  - command: "df -h"
    note: Filesystem free space on the host you run it from.
  - command: "du -sh directory"
    note: Measure directory size before archiving.

job_io_recommendations:
  - Prefer reading large shared inputs from project or reference datasets.
  - Write burst I/O to **/scratch** or **$TMPDIR** during the run, then copy results back to project.
  - Clean scratch artifacts you no longer need—frees space for other users.
